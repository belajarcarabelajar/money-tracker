services:
  postgres:
    image: postgres:18.3
    container_name: moneytracker_db
    environment:
      POSTGRES_DB: moneytracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/server/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: moneytracker_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    container_name: moneytracker_app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: moneytracker
      DB_USER: postgres
      DB_PASSWORD: postgres_secure_password
      OLLAMA_HOST: http://ollama:11434
      NODE_ENV: production
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  ollama_data:
